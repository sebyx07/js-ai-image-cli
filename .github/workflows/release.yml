name: Release to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for npm trusted publishers (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN secret needed.
      # Setup: npmjs.com → ai-media-cli → Settings → Trusted Publishers
      #   → Add: repo sebyx07/js-ai-image-cli, workflow release.yml
      - name: Publish to npm
        run: npm publish --access public --provenance
