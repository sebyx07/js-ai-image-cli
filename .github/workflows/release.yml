name: Release to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Trusted publishing requires npm >= 11.5.1
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # npm Trusted Publishers (OIDC) — no tokens needed.
      # Setup: npmjs.com → ai-media-cli → Settings → Trusted Publishers
      #   → Owner: sebyx07, Repo: js-ai-image-cli, Workflow: release.yml
      - name: Publish to npm
        run: npm publish --provenance --access public
