name: Release to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # Trusted Publishers (OIDC) — no NPM_TOKEN needed.
      # npmjs.com → ai-media-cli → Settings → Trusted Publishers
      #   → Owner: sebyx07, Repo: js-ai-image-cli, Workflow: release.yml
      #
      # Remove any .npmrc that setup-node may have created so npm
      # falls through to OIDC provenance auth instead of empty token auth.
      - name: Publish to npm
        run: |
          rm -f ~/.npmrc .npmrc
          npm publish --access public --provenance --registry https://registry.npmjs.org
